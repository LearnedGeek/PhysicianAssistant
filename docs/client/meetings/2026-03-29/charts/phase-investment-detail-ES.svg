<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="Arial, sans-serif">
  <rect width="800" height="540" fill="#1a1a2e" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">Inversión Fase por Fase — Horas por Socio</text>
  <text x="400" y="55" text-anchor="middle" fill="#808090" font-size="12">Desglose completo de la fase de construcción (pre-ingresos)</text>

  <!-- Axis line -->
  <line x1="195" y1="75" x2="195" y2="440" stroke="#404060" stroke-width="1"/>

  <!-- Row 1: Pre-Project -->
  <text x="185" y="98" text-anchor="end" fill="#a0a0b0" font-size="12" font-weight="bold">Pre-Proyecto</text>
  <text x="185" y="112" text-anchor="end" fill="#606080" font-size="10">(completado)</text>
  <rect x="200" y="86" width="370" height="20" fill="#2563eb" rx="3"/>
  <text x="575" y="100" fill="#93b4f5" font-size="11">Mark: 350 hrs — $52,500</text>
  <text x="200" y="124" fill="#6ee7b7" font-size="11" font-style="italic">Martin: años de desarrollo conceptual (no cuantificado)</text>

  <!-- Row 2: Phase 1 -->
  <text x="185" y="168" text-anchor="end" fill="#a0a0b0" font-size="12" font-weight="bold">Fase 1</text>
  <text x="185" y="182" text-anchor="end" fill="#606080" font-size="10">Descubrimiento (Sem 1–4)</text>
  <rect x="200" y="156" width="63" height="20" fill="#2563eb" rx="3"/>
  <text x="268" y="170" fill="#93b4f5" font-size="11">Mark: 60 hrs — $9,000 + $500</text>
  <rect x="200" y="180" width="26" height="20" fill="#10b981" rx="3"/>
  <text x="231" y="194" fill="#6ee7b7" font-size="11">Martin: 25 hrs — $6,250 + $2,500</text>

  <!-- Row 3: Phase 2 -->
  <text x="185" y="238" text-anchor="end" fill="#a0a0b0" font-size="12" font-weight="bold">Fase 2</text>
  <text x="185" y="252" text-anchor="end" fill="#606080" font-size="10">Chatbot Productos (Sem 5–9)</text>
  <rect x="200" y="226" width="85" height="20" fill="#2563eb" rx="3"/>
  <text x="290" y="240" fill="#93b4f5" font-size="11">Mark: 80 hrs — $12,000 + $600</text>
  <rect x="200" y="250" width="19" height="20" fill="#10b981" rx="3"/>
  <text x="224" y="264" fill="#6ee7b7" font-size="11">Martin: 18 hrs — $4,500 + $2,500</text>

  <!-- Row 4: Phase 3 -->
  <text x="185" y="308" text-anchor="end" fill="#a0a0b0" font-size="12" font-weight="bold">Fase 3</text>
  <text x="185" y="322" text-anchor="end" fill="#606080" font-size="10">IA Médica (Sem 10–17)</text>
  <rect x="200" y="296" width="127" height="20" fill="#2563eb" rx="3"/>
  <text x="332" y="310" fill="#93b4f5" font-size="11">Mark: 120 hrs — $18,000 + $900</text>
  <rect x="200" y="320" width="37" height="20" fill="#10b981" rx="3"/>
  <text x="242" y="334" fill="#6ee7b7" font-size="11">Martin: 35 hrs — $8,750 + $2,500</text>

  <!-- Row 5: Phase 4 -->
  <text x="185" y="378" text-anchor="end" fill="#a0a0b0" font-size="12" font-weight="bold">Fase 4</text>
  <text x="185" y="392" text-anchor="end" fill="#606080" font-size="10">Panel + Lanzamiento (Sem 18–22)</text>
  <rect x="200" y="366" width="85" height="20" fill="#2563eb" rx="3"/>
  <text x="290" y="380" fill="#93b4f5" font-size="11">Mark: 80 hrs — $12,000 + $700</text>
  <rect x="200" y="390" width="47" height="20" fill="#10b981" rx="3"/>
  <text x="252" y="404" fill="#6ee7b7" font-size="11">Martin: 45 hrs — $11,250 + $2,500</text>

  <!-- Divider -->
  <line x1="30" y1="425" x2="770" y2="425" stroke="#404060" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Totals -->
  <text x="185" y="453" text-anchor="end" fill="#e0e0e0" font-size="13" font-weight="bold">TOTAL</text>
  <rect x="200" y="440" width="550" height="22" fill="#1e40af" rx="3"/>
  <text x="210" y="456" fill="white" font-size="12" font-weight="bold">Mark: 690 hrs — $103,500 valor + $7,000 efectivo = $110,500</text>
  <rect x="200" y="466" width="195" height="22" fill="#047857" rx="3"/>
  <text x="210" y="482" fill="white" font-size="12" font-weight="bold">Martin: 123 hrs — $30,750 valor + $10,000 efectivo + trabajo conceptual</text>

  <!-- Legend -->
  <rect x="240" y="505" width="16" height="16" fill="#2563eb" rx="2"/>
  <text x="262" y="518" fill="#e0e0e0" font-size="12">Mark (Learned Geek) — $150/hr</text>
  <rect x="470" y="505" width="16" height="16" fill="#10b981" rx="2"/>
  <text x="492" y="518" fill="#e0e0e0" font-size="12">Martin (DrOk) — $250/hr</text>
</svg>
