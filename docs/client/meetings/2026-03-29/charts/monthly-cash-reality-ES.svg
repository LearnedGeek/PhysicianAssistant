<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="Arial, sans-serif">
  <rect width="700" height="420" fill="#1a1a2e" rx="12"/>

  <text x="350" y="40" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">Realidad Mensual — Primeros 12 Meses Post-Lanzamiento</text>
  <text x="350" y="60" text-anchor="middle" fill="#808090" font-size="12">A $100/médico/mes — ¿quién paga cuando no hay ingresos?</text>

  <!-- Axis -->
  <line x1="80" y1="320" x2="660" y2="320" stroke="#404060" stroke-width="1"/>
  <line x1="80" y1="80" x2="80" y2="320" stroke="#404060" stroke-width="1"/>

  <!-- Zero line -->
  <line x1="80" y1="240" x2="660" y2="240" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="70" y="244" text-anchor="end" fill="#ef4444" font-size="10">$0</text>

  <!-- Y axis labels -->
  <text x="70" y="84" text-anchor="end" fill="#a0a0b0" font-size="10">$5,000</text>
  <text x="70" y="164" text-anchor="end" fill="#a0a0b0" font-size="10">$2,500</text>
  <text x="70" y="284" text-anchor="end" fill="#a0a0b0" font-size="10">-$500</text>

  <!-- Revenue bars (green) -->
  <rect x="100" y="237" width="35" height="3" fill="#10b981" rx="2"/>
  <rect x="148" y="230" width="35" height="10" fill="#10b981" rx="2"/>
  <rect x="196" y="224" width="35" height="16" fill="#10b981" rx="2"/>
  <rect x="244" y="214" width="35" height="26" fill="#10b981" rx="2"/>
  <rect x="292" y="208" width="35" height="32" fill="#10b981" rx="2"/>
  <rect x="340" y="192" width="35" height="48" fill="#10b981" rx="2"/>
  <rect x="388" y="176" width="35" height="64" fill="#10b981" rx="2"/>
  <rect x="436" y="160" width="35" height="80" fill="#10b981" rx="2"/>
  <rect x="484" y="144" width="35" height="96" fill="#10b981" rx="2"/>
  <rect x="532" y="112" width="35" height="128" fill="#10b981" rx="2"/>
  <rect x="580" y="96" width="35" height="144" fill="#10b981" rx="2"/>
  <rect x="628" y="80" width="35" height="160" fill="#10b981" rx="2"/>

  <!-- Cost line (red) -->
  <line x1="117" y1="224" x2="165" y2="224" stroke="#ef4444" stroke-width="2"/>
  <line x1="165" y1="224" x2="213" y2="224" stroke="#ef4444" stroke-width="2"/>
  <line x1="213" y1="223" x2="261" y2="222" stroke="#ef4444" stroke-width="2"/>
  <line x1="261" y1="222" x2="309" y2="222" stroke="#ef4444" stroke-width="2"/>
  <line x1="309" y1="222" x2="357" y2="221" stroke="#ef4444" stroke-width="2"/>
  <line x1="357" y1="221" x2="405" y2="220" stroke="#ef4444" stroke-width="2"/>
  <line x1="405" y1="220" x2="453" y2="219" stroke="#ef4444" stroke-width="2"/>
  <line x1="453" y1="219" x2="501" y2="218" stroke="#ef4444" stroke-width="2"/>
  <line x1="501" y1="218" x2="549" y2="217" stroke="#ef4444" stroke-width="2"/>
  <line x1="549" y1="217" x2="597" y2="216" stroke="#ef4444" stroke-width="2"/>
  <line x1="597" y1="216" x2="645" y2="215" stroke="#ef4444" stroke-width="2"/>

  <!-- Cost dots -->
  <circle cx="117" cy="224" r="3" fill="#ef4444"/>
  <circle cx="165" cy="224" r="3" fill="#ef4444"/>
  <circle cx="213" cy="223" r="3" fill="#ef4444"/>
  <circle cx="261" cy="222" r="3" fill="#ef4444"/>
  <circle cx="309" cy="222" r="3" fill="#ef4444"/>
  <circle cx="357" cy="221" r="3" fill="#ef4444"/>
  <circle cx="405" cy="220" r="3" fill="#ef4444"/>
  <circle cx="453" cy="219" r="3" fill="#ef4444"/>

  <!-- Month labels -->
  <text x="117" y="338" text-anchor="middle" fill="#a0a0b0" font-size="9">M1</text>
  <text x="165" y="338" text-anchor="middle" fill="#a0a0b0" font-size="9">M2</text>
  <text x="213" y="338" text-anchor="middle" fill="#a0a0b0" font-size="9">M3</text>
  <text x="261" y="338" text-anchor="middle" fill="#a0a0b0" font-size="9">M4</text>
  <text x="309" y="338" text-anchor="middle" fill="#a0a0b0" font-size="9">M5</text>
  <text x="357" y="338" text-anchor="middle" fill="#a0a0b0" font-size="9">M6</text>
  <text x="405" y="338" text-anchor="middle" fill="#a0a0b0" font-size="9">M7</text>
  <text x="453" y="338" text-anchor="middle" fill="#a0a0b0" font-size="9">M8</text>
  <text x="501" y="338" text-anchor="middle" fill="#a0a0b0" font-size="9">M9</text>
  <text x="549" y="338" text-anchor="middle" fill="#a0a0b0" font-size="9">M10</text>
  <text x="597" y="338" text-anchor="middle" fill="#a0a0b0" font-size="9">M11</text>
  <text x="645" y="338" text-anchor="middle" fill="#a0a0b0" font-size="9">M12</text>

  <!-- Annotations -->
  <rect x="90" y="250" width="185" height="22" fill="#ef444433" rx="4"/>
  <text x="182" y="265" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="bold">Mark paga el déficit de su bolsillo</text>

  <rect x="280" y="250" width="140" height="22" fill="#10b98133" rx="4"/>
  <text x="350" y="265" text-anchor="middle" fill="#10b981" font-size="10" font-weight="bold">Zona de equilibrio</text>

  <!-- Legend -->
  <rect x="180" y="380" width="16" height="16" fill="#10b981" rx="2"/>
  <text x="202" y="393" fill="#e0e0e0" font-size="12">Ingresos</text>
  <rect x="320" y="380" width="16" height="16" fill="#ef4444" rx="2"/>
  <text x="342" y="393" fill="#e0e0e0" font-size="12">Costos Operativos de Plataforma</text>
</svg>
